#--================Kafka================--#
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    build:
      context: Docker
      dockerfile: db.Dockerfile
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
    volumes:
      - ./Docker/init-db:/docker-entrypoint-initdb.d

  kafka-connect:
    image: quay.io/debezium/connect:latest
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    depends_on:
      - kafka
      - postgres

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME=debezium-connect
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS=http://kafka-connect:8083
    depends_on:
      - kafka
      - kafka-connect

#--================Workers================--#
  worker-expenses:
    build: 
      context: ./anomaly_detector
    container_name: worker_expenses
    restart: on-failure
    environment:
      - TARGET_TABLE=despesas
      - GROUP_ID=group_worker_expenses
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db
      - POSTGRES_SERVER=postgres:5432
      - PRODUCTION=false
      - COLUMNS_TO_IGNORE=id,descricao
      - DATE_COLUMNS=data_hora
    volumes:
      - ./anomaly_detector/test/models:/app/models 
    depends_on:
      - kafka
      - postgres

#--================Handler================--#

  anomaly-handler:
    build: 
      context: ./anomaly_handler 
    container_name: anomaly_handler
    restart: on-failure
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SENDER_EMAIL=seu_email@gmail.com
      - EMAIL_PASSWORD=sua_senha_de_app
      - RECIEVER_EMAIL=equipe_fraude@empresa.com
      - PRODUCTION=false
      - KAFKA_GROUP_ID=group_anomaly_handler
    depends_on:
      - kafka
      - postgres