#--================Kafka================--#
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 20s

  postgres-source:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db_real
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_real"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres-internal:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin_fraude
      - POSTGRES_PASSWORD=senha_segura
      - POSTGRES_DB=db_seguranca
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_fraude -d db_seguranca"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  kafka-connect:
    image: quay.io/debezium/connect:latest
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    depends_on:
      - kafka
      - postgres-source

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME=debezium-connect
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS=http://kafka-connect:8083
    depends_on:
      - kafka
      - kafka-connect

#--================Workers================--#
  worker-insurance:
    build: 
      context: ./anomaly_detector
      dockerfile: DockerFile
    container_name: worker_insurance
    restart: on-failure
    environment:
      - GROUP_ID=group_worker_insurance
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      
      #Changing the table name that the data will come
      - TARGET_TABLE=insurance_claims
      - COLUMNS_TO_IGNORE=id,FraudFound_P,PolicyNumber,RepNumber 
      
      #Database connection variables
      #Source Database
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db_real 
      - POSTGRES_SERVER=postgres-source:5432 
      
      #Internal Database
      - POSTGRES_USER_INTERNAL=admin_fraude
      - POSTGRES_PASSWORD_INTERNAL=senha_segura
      - POSTGRES_DB_INTERNAL=db_seguranca 
      - POSTGRES_SERVER_INTERNAL=postgres-internal:5432

      #Defining the tresholds, depending on the logic of the use
      - RF_HIGH_CONFIDENCE_THRESHOLD=0.85
      - RF_MODERATE_THRESHOLD=0.4
      - IF_COMBINED_THRESHOLD=-0.15
      - IF_STANDALONE_THRESHOLD=-0.1

      #Defining the contamination of the set
      - CONTAMINATION=0.01

      #If the table have date columns, you need to add the names separated with comma
      # - DATE_COLUMNS=
    volumes:
      - ./anomaly_detector/src/models:/app/models
    depends_on:
      kafka:
        condition: service_healthy
      postgres-source:
        condition: service_healthy

#--================Handler================--#

  anomaly-handler:
    build: 
      context: ./anomaly_handler 
      dockerfile: DockerFile
    container_name: anomaly_handler
    restart: on-failure
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SENDER_EMAIL=seu_email@gmail.com
      - EMAIL_PASSWORD=sua_senha_de_app
      - RECIEVER_EMAIL=equipe_fraude@empresa.com
      - KAFKA_GROUP_ID=group_anomaly_handler
      - POSTGRES_USER=admin_fraude
      - POSTGRES_PASSWORD=senha_segura
      - POSTGRES_DB=db_seguranca 
      - POSTGRES_SERVER=postgres-internal:5432
    depends_on:
      - kafka
      - postgres-internal

#--===========Anomalies-web-hub===========--#
  hub-backend:
    build: 
      context: ./anomalies_hub_backend
      dockerfile: DockerFile
    container_name: hub-backend
    ports:
      - "8000:8000"
    restart: on-failure
    environment:
      #Source Database
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db_real 
      - POSTGRES_SERVER=postgres-source:5432 
      
      #Internal Database
      - POSTGRES_USER_INTERNAL=admin_fraude
      - POSTGRES_PASSWORD_INTERNAL=senha_segura
      - POSTGRES_DB_INTERNAL=db_seguranca 
      - POSTGRES_SERVER_INTERNAL=postgres-internal:5432
    volumes:
      
      - ./anomaly_detector/src/models:/app/models
      
      - ./anomaly_detector/src/training_pipeline:/app/training_pipeline
    depends_on:
      - postgres-internal

  hub-frontend:
    build:
      context: ./anomalies_hub_frontend/anomalies_hub_frontend
    container_name: hub-frontend
    ports:
      - "3000:80"
    restart: on-failure
    depends_on:
      - hub-backend

#--================Seed (test only)================--#
  seed-insurance:
    build:
      context: ./scripts/startup_datasets_seed
    container_name: seed_insurance
    restart: "no"
    environment:
      - POSTGRES_SOURCE_HOST=postgres-source
      - POSTGRES_SOURCE_PORT=5432
      - POSTGRES_SOURCE_USER=postgres
      - POSTGRES_SOURCE_PASSWORD=postgres
      - POSTGRES_SOURCE_DB=db_real
      - POSTGRES_INTERNAL_HOST=postgres-internal
      - POSTGRES_INTERNAL_PORT=5432
      - POSTGRES_INTERNAL_USER=admin_fraude
      - POSTGRES_INTERNAL_PASSWORD=senha_segura
      - POSTGRES_INTERNAL_DB=db_seguranca
      - TARGET_TABLE=insurance_claims
      - FRAUD_COLUMN=FraudFound_P
      - CSV_FILE=insurance_fraud.csv
      - POLL_INTERVAL=3
      - POLL_TIMEOUT=600
    depends_on:
      postgres-source:
        condition: service_healthy
      postgres-internal:
        condition: service_healthy
    profiles:
      - seed