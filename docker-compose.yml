#--================Kafka================--#
services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres-source:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db_real
    command: ["postgres", "-c", "wal_level=logical"]

  postgres-internal:
    image: postgres:15-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=admin_fraude
      - POSTGRES_PASSWORD=senha_segura
      - POSTGRES_DB=db_seguranca

  kafka-connect:
    image: quay.io/debezium/connect:latest
    container_name: kafka-connect
    ports:
      - "8083:8083"
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_statuses
    depends_on:
      - kafka
      - postgres-source

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper:2181
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME=debezium-connect
      - KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS=http://kafka-connect:8083
    depends_on:
      - kafka
      - kafka-connect

#--================Workers================--#
  worker-transactions:
    build: 
      context: ./anomaly_detector
    container_name: worker_transactions
    restart: on-failure
    environment:
      - GROUP_ID=group_worker_creditcard
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      
      #Changing the table name that the data will come
      - TARGET_TABLE=credit_card_transactions
      
      #Database connection variables
      #Source Database
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=db_real 
      - POSTGRES_SERVER=postgres-source:5432 
      
      #Internal Database
      - POSTGRES_USER_INTERNAL=admin_fraude
      - POSTGRES_PASSWORD_INTERNAL=senha_segura
      - POSTGRES_DB_INTERNAL=db_seguranca 
      - POSTGRES_SERVER_INTERNAL=postgres-internal:5432

      #Defining the columns that the Model should not see
      - COLUMNS_TO_IGNORE=id,Time,Class 

      #If the table have date columns, you need to add the names separated with comma
      # - DATE_COLUMNS=
    volumes:
      - ./anomaly_detector/src/models:/app/models 
    depends_on:
      - kafka
      - postgres-source

#--================Handler================--#

  anomaly-handler:
    build: 
      context: ./anomaly_handler 
    container_name: anomaly_handler
    restart: on-failure
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SENDER_EMAIL=seu_email@gmail.com
      - EMAIL_PASSWORD=sua_senha_de_app
      - RECIEVER_EMAIL=equipe_fraude@empresa.com
      - PRODUCTION=false
      - KAFKA_GROUP_ID=group_anomaly_handler
      - POSTGRES_USER=admin_fraude
      - POSTGRES_PASSWORD=senha_segura
      - POSTGRES_DB=db_seguranca 
      - POSTGRES_SERVER=postgres-internal:5432
    depends_on:
      - kafka
      - postgres-internal